<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- นำเข้าฟอนต์ Google Font เพื่อความสวยงาม -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #4B5563;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            color: var(--text-main);
        }

        /* ตกแต่งปุ่ม Start */
        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            width: 100%;
            margin-bottom: 1.5rem;
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* จัดการกรอบแสดงผลกล้อง */
        #webcam-container {
            margin: 1rem auto;
            border-radius: 12px;
            overflow: hidden;
            background-color: #E5E7EB;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
            border: 3px solid #E5E7EB;
        }

        #webcam-container canvas {
            display: block;
            border-radius: 8px;
        }

        /* ปรับแต่งส่วนแสดงผล Label และแถบเปอร์เซ็นต์ */
        #label-container {
            margin-top: 1.5rem;
            text-align: left;
        }

        .prediction-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.25rem;
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        .progress-bar-bg {
            background-color: #E5E7EB;
            border-radius: 9999px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }

        .progress-bar-fill {
            background-color: var(--primary-color);
            height: 100%;
            width: 0%;
            transition: width 0.1s ease-out;
            border-radius: 9999px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <button class="btn-start" type="button" onclick="init()">เปิดกล้องและเริ่มใช้งาน</button>
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้หลังจากกดปุ่ม -->
    </div>
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script type="text/javascript">
    // ลิงก์โมเดลเดิมของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/sig1pdXOe/";

    let model, webcam, labelContainer, maxPredictions;

    // โหลดโมเดลและตั้งค่ากล้อง
    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        // แสดงผลกล้องในเว็บ
        document.getElementById("webcam-container").innerHTML = ""; // ล้างข้อความเดิมออกก่อน
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        
        // สร้างโครงสร้างสำหรับการแสดงผลผลลัพธ์ในรูปแบบแถบสวยงาม
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างข้อมูลเก่า
        for (let i = 0; i < maxPredictions; i++) { 
            const row = document.createElement("div");
            row.className = "prediction-row";
            row.innerHTML = `
                <div class="prediction-info">
                    <span class="class-name">-</span>
                    <span class="probability-value">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill"></div>
                </div>
            `;
            labelContainer.appendChild(row);
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    // ประมวลผลภาพจากกล้อง
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            const probability = prediction[i].probability;
            const percentage = (probability * 100).toFixed(0) + "%";
            
            // อัปเดตข้อความและแถบความน่าจะเป็นในหน้าเว็บ
            const row = labelContainer.childNodes[i];
            if (row) {
                row.querySelector(".class-name").innerText = className;
                row.querySelector(".probability-value").innerText = percentage;
                row.querySelector(".progress-bar-fill").style.width = percentage;
            }
        }
    }
</script>

</body>
</html>
